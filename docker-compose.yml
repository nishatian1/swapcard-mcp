# Generic self-host compose. Put a TLS-terminating reverse proxy (Caddy, nginx, Traefik)
# in front of port 8090 and set PUBLIC_BASE_URL to the public URL it serves.
services:
  swapcard-mcp:
    build: .
    container_name: swapcard-mcp
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:8090"
